<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Administrativo — GymCore</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/login.css">

  <style>
  .login-signature {
  margin-top: 22px;
  text-align: center;
  font-size: 12px;
  color: rgba(17, 24, 39, 0.55);
  line-height: 1.5;
}

.login-signature span {
  display: block;
}</style>
</head>
<body>

<div class="page">
  <div class="card">

    <!-- Logo: reemplaza src con la ruta de tu imagen -->
    <div class="logo-wrap">
      <img src="/images/iso_black.png" alt="Logo del gimnasio" class="logo-img" style="width: 60px;" />
      <div class="logo-text">
        <div class="logo-name">NIX Membership Manager</div>
        <div class="logo-sub">Panel Administrativo</div>
      </div>
    </div>

    <h1 class="headline">Bienvenido de vuelta</h1>
    <p class="subline">Ingresa tus credenciales para continuar</p>

    <div class="divider"></div>

    <!-- Error -->
    <div class="error-msg" id="errorMsg">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
      </svg>
      Usuario o contraseña incorrectos.
    </div>

    <!-- Form -->
    <form id="loginForm" novalidate>

      <div class="field">
        <label for="usuario">Usuario</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
            </svg>
          </span>
          <input type="text" id="usuario" name="usuario" placeholder="tu usuario" autocomplete="username" />
        </div>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
            </svg>
          </span>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="toggle-pass" id="togglePass" aria-label="Mostrar contraseña">
            <svg id="eyeShow" width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
            </svg>
            <svg id="eyeHide" width="17" height="17" viewBox="0 0 24 24" fill="currentColor" style="display:none">
              <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="btnLogin">
        <div class="spinner" id="spinner"></div>
        <span class="btn-label" id="btnLabel">Iniciar Sesión</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" id="btnArrow">
          <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
        </svg>
      </button>

      <span class="btn-accent"></span>

    </form>

    <div class="card-footer">
      <span class="badge" id="systemBadge">
        <span class="badge-dot"></span>
        <span id="systemStatusText">Verificando sistema</span>
      </span>
      <div class="login-signature">
  <span>Perfection Fitness v1.0</span>
  <span>Desarrollado por NIX Studio</span>
</div>
      <span class="version">v1.0</span>
    </div>

  </div>
</div>

<script>
const loginForm = document.getElementById('loginForm');
const errorMsg = document.getElementById('errorMsg');
const btnLogin = document.getElementById('btnLogin');
const togglePass = document.getElementById('togglePass');
const passwordInput = document.getElementById('password');
const eyeShow = document.getElementById('eyeShow');
const eyeHide = document.getElementById('eyeHide');
const systemBadge = document.getElementById('systemBadge');
const systemStatusText = document.getElementById('systemStatusText');
const API_BASE = '/api';

async function cargarEstadoSistema() {
  try {
    const res = await fetch(`${API_BASE}/verificar-sesion`, {
      credentials: 'include',
      cache: 'no-store'
    });

    if (res.status === 401) {
      systemBadge.classList.remove('system-inactive');
      systemStatusText.textContent = 'Sistema activo';
      return;
    }

    if (res.status >= 500) {
      throw new Error('Servidor no disponible');
    }

    if (!res.ok) {
      systemBadge.classList.remove('system-inactive');
      systemStatusText.textContent = 'Sistema activo';
      return;
    }

    systemBadge.classList.remove('system-inactive');
    systemStatusText.textContent = 'Sistema activo';

  } catch (error) {
    systemBadge.classList.add('system-inactive');
    systemStatusText.textContent = 'Sistema inactivo';
  }
}

togglePass.addEventListener('click', () => {
  const visible = passwordInput.type === 'text';

  passwordInput.type = visible ? 'password' : 'text';
  eyeShow.style.display = visible ? 'block' : 'none';
  eyeHide.style.display = visible ? 'none' : 'block';
});

loginForm.addEventListener('submit', async function(e) {
  e.preventDefault();

  const usuario = document.getElementById('usuario').value.trim();
  const password = document.getElementById('password').value.trim();

  errorMsg.classList.remove('visible');
  btnLogin.classList.add('loading');

  try {

    const res = await fetch(`${API_BASE}/login`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      credentials: 'include',
      body: JSON.stringify({
        usuario,
        password
      })
    });

    if (res.ok) {
      window.location.href = 'dashboard.html';
    } else {
      btnLogin.classList.remove('loading');
      errorMsg.classList.add('visible');
    }

  } catch (error) {
    console.error(error);
    btnLogin.classList.remove('loading');
    errorMsg.classList.add('visible');
  }
});

cargarEstadoSistema();
</script>
</body>
</html>

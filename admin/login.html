<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Administrativo — GymCore</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white:   #FFFFFF;
      --red:     #DD0F0D;
      --red-dark:#B50C0A;
      --yellow:  #F6D42E;
      --grey-50: #F9F9F9;
      --grey-100:#F0F0F0;
      --grey-300:#C8C8C8;
      --grey-500:#888888;
      --grey-800:#222222;
      --shadow-sm: 0 2px 8px rgba(0,0,0,.06);
      --shadow-md: 0 8px 32px rgba(0,0,0,.10);
      --shadow-lg: 0 20px 60px rgba(0,0,0,.14);
      --radius:  14px;
      --transition: .22s cubic-bezier(.4,0,.2,1);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--grey-50);
      color: var(--grey-800);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 110% -10%, rgba(221,15,13,.10) 0%, transparent 65%),
        radial-gradient(ellipse 55% 45% at -15% 110%, rgba(246,212,46,.12) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle grid pattern */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 520px 1fr;
      grid-template-rows: 1fr auto 1fr;
      align-items: center;
      justify-items: center;
      padding: 24px;
    }

    /* ── Card ── */
    .card {
      grid-column: 2;
      grid-row: 2;
      width: 100%;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      border: 1px solid rgba(0,0,0,.06);
      padding: 52px 48px 44px;
      animation: cardIn .55s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(.98); }
      to   { opacity: 1; transform: translateY(0)    scale(1);   }
    }

    /* ── Logo ── */
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
    }

    .logo-img {
      height: 48px;
      width: auto;
      max-width: 120px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .logo-text { line-height: 1; }

    .logo-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: .04em;
      color: var(--grey-800);
    }

    .logo-sub {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--grey-500);
      margin-top: 2px;
    }

    /* ── Headline ── */
    .headline {
      margin-bottom: 8px;
      font-size: 22px;
      font-weight: 600;
      color: var(--grey-800);
      line-height: 1.2;
    }

    .subline {
      font-size: 14px;
      color: var(--grey-500);
      margin-bottom: 36px;
      font-weight: 400;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--grey-100);
      margin-bottom: 36px;
    }

    /* ── Form ── */
    .field { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--grey-800);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--grey-300);
      pointer-events: none;
      transition: color var(--transition);
      display: flex;
    }

    input {
      width: 100%;
      height: 48px;
      padding: 0 44px 0 42px;
      border: 1.5px solid var(--grey-100);
      border-radius: 10px;
      background: var(--grey-50);
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      font-weight: 400;
      color: var(--grey-800);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }

    input::placeholder { color: var(--grey-300); }

    input:focus {
      border-color: var(--red);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(221,15,13,.10);
    }

    input:focus ~ .input-icon,
    .input-wrap:focus-within .input-icon { color: var(--red); }

    /* Toggle password */
    .toggle-pass {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--grey-300);
      padding: 4px;
      display: flex;
      transition: color var(--transition);
    }
    .toggle-pass:hover { color: var(--grey-800); }

    /* ── Error message ── */
    .error-msg {
      display: none;
      align-items: center;
      gap: 7px;
      background: rgba(221,15,13,.07);
      border: 1px solid rgba(221,15,13,.18);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--red-dark);
      font-weight: 500;
      margin-bottom: 20px;
      animation: shake .4s cubic-bezier(.36,.07,.19,.97);
    }

    .error-msg.visible { display: flex; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }

    /* ── Button ── */
    .btn-submit {
      width: 100%;
      height: 50px;
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .02em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
      margin-bottom: 20px;
      transition: background var(--transition), box-shadow var(--transition), transform var(--transition);
      box-shadow: 0 4px 16px rgba(221,15,13,.30);
      position: relative;
      overflow: hidden;
    }

    .btn-submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.12) 0%, transparent 60%);
      pointer-events: none;
    }

    .btn-submit:hover {
      background: var(--red-dark);
      box-shadow: 0 6px 22px rgba(221,15,13,.42);
      transform: translateY(-1px);
    }

    .btn-submit:active { transform: translateY(0); box-shadow: 0 2px 10px rgba(221,15,13,.28); }

    .btn-submit.loading { pointer-events: none; }

    /* Spinner */
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,.35);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-submit.loading .spinner    { display: block; }
    .btn-submit.loading .btn-label  { opacity: .7; }

    /* ── Yellow accent bar on button ── */
    .btn-accent {
      display: block;
      height: 3px;
      border-radius: 0 0 10px 10px;
      background: var(--yellow);
      margin-top: -20px;
      margin-bottom: 20px;
      width: 100%;
      opacity: .7;
    }

    /* ── Forgot password ── */
    .forgot {
      text-align: center;
    }

    .forgot a {
      font-size: 13.5px;
      color: var(--grey-500);
      text-decoration: none;
      font-weight: 500;
      transition: color var(--transition);
      border-bottom: 1px dashed transparent;
      padding-bottom: 1px;
    }

    .forgot a:hover {
      color: var(--red);
      border-bottom-color: rgba(221,15,13,.30);
    }

    /* ── Footer ── */
    .card-footer {
      margin-top: 36px;
      padding-top: 20px;
      border-top: 1px solid var(--grey-100);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--grey-300);
    }

    .badge-dot {
      width: 6px; height: 6px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    .badge.system-inactive {
      color: var(--red-dark);
    }

    .badge.system-inactive .badge-dot {
      background: var(--red);
      animation: none;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .6; transform: scale(.8); }
    }

    .version {
      font-size: 11px;
      color: var(--grey-300);
      font-weight: 500;
    }

    /* ── Responsive ── */
    @media (max-width: 580px) {
      .page { grid-template-columns: 1fr; padding: 16px; }
      .card { grid-column: 1; padding: 36px 24px 32px; }
      .headline { font-size: 20px; }
    }
  </style>
</head>
<body>

<div class="page">
  <div class="card">

    <!-- Logo: reemplaza src con la ruta de tu imagen -->
    <div class="logo-wrap">
      <img src="" alt="Logo del gimnasio" class="logo-img" />
      <div class="logo-text">
        <div class="logo-name"><!-- Nombre del gimnasio --></div>
        <div class="logo-sub">Panel Administrativo</div>
      </div>
    </div>

    <h1 class="headline">Bienvenido de vuelta</h1>
    <p class="subline">Ingresa tus credenciales para continuar</p>

    <div class="divider"></div>

    <!-- Error -->
    <div class="error-msg" id="errorMsg">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
      </svg>
      Usuario o contraseña incorrectos.
    </div>

    <!-- Form -->
    <form id="loginForm" novalidate>

      <div class="field">
        <label for="usuario">Usuario</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
            </svg>
          </span>
          <input type="text" id="usuario" name="usuario" placeholder="tu usuario" autocomplete="username" />
        </div>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
            </svg>
          </span>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="toggle-pass" id="togglePass" aria-label="Mostrar contraseña">
            <svg id="eyeShow" width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
            </svg>
            <svg id="eyeHide" width="17" height="17" viewBox="0 0 24 24" fill="currentColor" style="display:none">
              <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="btnLogin">
        <div class="spinner" id="spinner"></div>
        <span class="btn-label" id="btnLabel">Iniciar Sesión</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" id="btnArrow">
          <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
        </svg>
      </button>

      <span class="btn-accent"></span>

    </form>

    <div class="card-footer">
      <span class="badge" id="systemBadge">
        <span class="badge-dot"></span>
        <span id="systemStatusText">Verificando sistema</span>
      </span>
      <span class="version">v2.4.1</span>
    </div>

  </div>
</div>

<script>
const loginForm = document.getElementById('loginForm');
const errorMsg = document.getElementById('errorMsg');
const btnLogin = document.getElementById('btnLogin');
const togglePass = document.getElementById('togglePass');
const passwordInput = document.getElementById('password');
const eyeShow = document.getElementById('eyeShow');
const eyeHide = document.getElementById('eyeHide');
const systemBadge = document.getElementById('systemBadge');
const systemStatusText = document.getElementById('systemStatusText');
const API_BASE = 'https://perfection-fitness-backend-production.up.railway.app/api';

async function cargarEstadoSistema() {
  try {
    const res = await fetch(`${API_BASE}/verificar-sesion`, {
      credentials: 'include'
    });

    if (!res.ok) {
      throw new Error('Servidor no disponible');
    }

    systemBadge.classList.remove('system-inactive');
    systemStatusText.textContent = 'Sistema activo';

  } catch (error) {
    systemBadge.classList.add('system-inactive');
    systemStatusText.textContent = 'Sistema inactivo';
  }
}

togglePass.addEventListener('click', () => {
  const visible = passwordInput.type === 'text';

  passwordInput.type = visible ? 'password' : 'text';
  eyeShow.style.display = visible ? 'block' : 'none';
  eyeHide.style.display = visible ? 'none' : 'block';
});

loginForm.addEventListener('submit', async function(e) {
  e.preventDefault();

  const usuario = document.getElementById('usuario').value.trim();
  const password = document.getElementById('password').value.trim();

  errorMsg.classList.remove('visible');
  btnLogin.classList.add('loading');

  try {

    const res = await fetch(`${API_BASE}/login`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      credentials: 'include',
      body: JSON.stringify({
        usuario,
        password
      })
    });

    if (res.ok) {
      window.location.href = 'dashboard.html';
    } else {
      btnLogin.classList.remove('loading');
      errorMsg.classList.add('visible');
    }

  } catch (error) {
    console.error(error);
    btnLogin.classList.remove('loading');
    errorMsg.classList.add('visible');
  }
});

cargarEstadoSistema();
</script>
</body>
</html>
